name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
    paths:
      - 'Project.toml'
      - 'src/**'
      - 'test/**'
      # - 'docs/*'
  pull_request:
    paths:
      - 'Project.toml'
      - 'src/**'
      - 'test/**'
      # - 'docs/*'
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: core + integration / Julia ${{ matrix.version }} # / downgrade = ${{ matrix.downgrade }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
        arch:
          - x64
        # downgrade: ['false']
        # include:
        #   - version: '1.10'
        #     test_group: unit
        #     os: ubuntu-latest
        #     arch: x64
        #     downgrade: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
          include-all-prereleases: true
      - uses: julia-actions/cache@v3
      # - uses: julia-actions/julia-downgrade-compat@v1
      #   if: ${{ matrix.downgrade == 'true' }}
      #   with:
      #     skip: 'LinearAlgebra'
      - name: Add Julia registries
        run: |
          using Pkg
          pkg"registry add https://github.com/sanram-org/Registry.git"
          pkg"registry add General"
      - uses: julia-actions/julia-runtest@v1
        with:
          test_args: 'core integration'
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
        # env:
        #   CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
